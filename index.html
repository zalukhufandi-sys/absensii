<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Absensi Karyawan Matahari Medan Fair - OFFLINE</title>
    <style>
        /* [SAMA PERSIS DENGAN CSS ANDA - TIDAK BERUBAH] */
        * {margin:0;padding:0;box-sizing:border-box;}
        body {font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
        .container {max-width:1200px;margin:0 auto;background:white;border-radius:15px;box-shadow:0 20px 40px rgba(0,0,0,0.1);overflow:hidden;}
        .header {background:linear-gradient(135deg,#fb0202 0%,#fe0000 100%);color:white;padding:30px;text-align:center;}
        .header h1 {font-size:2.5em;margin-bottom:10px;}
        .content {padding:30px;}
        .form-section {background:#8bf904;padding:25px;border-radius:10px;margin-bottom:30px;border-left:5px solid #3207f2;}
        .form-grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:20px;}
        .form-group {display:flex;flex-direction:column;}
        label {font-weight:600;margin-bottom:8px;color:#333;}
        input,select {padding:12px;border:2px solid #e1e5e9;border-radius:8px;font-size:16px;transition:all 0.3s ease;}
        input:focus,select:focus {outline:none;border-color:#4facfe;box-shadow:0 0 0 3px rgba(79,172,254,0.1);}
        .btn {padding:12px 30px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s ease;text-decoration:none;display:inline-block;}
        .btn-primary {background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);color:white;}
        .btn-primary:hover {transform:translateY(-2px);box-shadow:0 10px 20px rgba(79,172,254,0.3);}
        .btn-danger {background:linear-gradient(135deg,#ff6b6b 0%,#ee5a52 100%);color:white;}
        .btn-danger:hover {transform:translateY(-2px);box-shadow:0 10px 20px rgba(255,107,107,0.3);}
        .btn-success {background:linear-gradient(135deg,#51cf66 0%,#40c057 100%);color:white;}
        .table-container {overflow-x:auto;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
        table {width:100%;border-collapse:collapse;background:white;}
        th,td {padding:15px;text-align:left;border-bottom:1px solid #e1e5e9;}
        th {background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);color:white;font-weight:600;position:sticky;top:0;}
        tr:hover {background:#f8f9fa;}
        .status {padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;text-transform:uppercase;}
        .status.hadir {background:#24f803;color:#155724;}
        .status.telat {background:#f4f803;color:#856404;}
        .status.alfa {background:#f8d7da;color:#721c24;}
        .actions {display:flex;gap:10px;}
        .no-data {text-align:center;padding:50px;color:#666;font-style:italic;}
        .stats {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px;}
        .stat-card {background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px;border-radius:10px;text-align:center;}
        .filter-section {background:#f8f9fa;padding:20px;border-radius:10px;margin-bottom:20px;}
        @media (max-width:768px) {.form-grid,.stats{grid-template-columns:1fr;}.header h1{font-size:2em;}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Absensi Karyawan <strong>Matahari Medan Fair</strong></h1>
            <p>✅ Sistem Absensi Offline - Data Aman di Browser</p>
        </div>

        <div class="content">
            <!-- STATISTIK -->
            <div class="stats" id="statsContainer">
                <div class="stat-card">
                    <h3 id="totalAbsensi">0</h3>
                    <p>Total Absensi</p>
                </div>
                <div class="stat-card">
                    <h3 id="hadirCount">0</h3>
                    <p>Hadir</p>
                </div>
                <div class="stat-card">
                    <h3 id="telatCount">0</h3>
                    <p>Telat</p>
                </div>
                <div class="stat-card">
                    <h3 id="alfaCount">0</h3>
                    <p>Alfa</p>
                </div>
            </div>

            <!-- FORM INPUT -->
            <div class="form-section">
                <h2 style="margin-bottom:20px;color:#333;">📝 Input Absensi Baru</h2>
                <form id="absensiForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nama">👤 Nama Karyawan *</label>
                            <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                        </div>
                        <div class="form-group">
                            <label for="nip">🆔 NIP / ID *</label>
                            <input type="text" id="nip" placeholder="123456" required>
                        </div>
                        <div class="form-group">
                            <label for="jabatan">💼 Jabatan</label>
                            <select id="jabatan">
                                <option value="">Pilih Jabatan</option>
                                <option value="Store Manager">Store Manager</option>
                                <option value="Asisten Manager">Asisten Manager</option>
                                <option value="Supervisor">Supervisor</option>
                                <option value="SA">SA</option>
                                <option value="SPB/SPG">SPB/SPG</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="status">📊 Status *</label>
                            <select id="status" required>
                                <option value="">Pilih Status</option>
                                <option value="hadir">✅ Hadir</option>
                                <option value="telat">⏰ Telat</option>
                                <option value="alfa">❌ Alfa</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">💾 Simpan Absensi</button>
                    <button type="button" onclick="clearAllData()" class="btn btn-danger" style="margin-left:10px;">🗑️ Hapus Semua Data</button>
                </form>
            </div>

            <!-- FILTER -->
            <div class="filter-section">
                <div style="display:flex;gap:15px;flex-wrap:wrap;">
                    <input type="date" id="filterDate" onchange="filterData()" style="padding:10px;border:2px solid #4facfe;border-radius:8px;">
                    <select id="filterStatus" onchange="filterData()" style="padding:10px;border:2px solid #4facfe;border-radius:8px;">
                        <option value="">Semua Status</option>
                        <option value="hadir">Hadir</option>
                        <option value="telat">Telat</option>
                        <option value="alfa">Alfa</option>
                    </select>
                    <button onclick="filterData()" class="btn btn-primary" style="padding:10px 20px;">🔍 Filter</button>
                    <button onclick="resetFilter()" class="btn btn-success" style="padding:10px 20px;">🔄 Reset</button>
                </div>
            </div>

            <!-- TABEL -->
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h2 style="color:#333;">📊 Daftar Absensi</h2>
                <div>
                    <button onclick="exportToExcel()" class="btn btn-success">📥 Export Excel</button>
                    <button onclick="printTable()" class="btn btn-primary" style="margin-left:10px;">🖨️ Print</button>
                </div>
            </div>

            <div class="table-container">
                <table id="absensiTable">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>NIP</th>
                            <th>Jabatan</th>
                            <th>Status</th>
                            <th>Tanggal</th>
                            <th>Jam</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" class="no-data">Belum ada data absensi</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let absensiData = JSON.parse(localStorage.getItem('absensiData')) || [];
        let filteredData = [...absensiData];

        // Inisialisasi
        document.addEventListener('DOMContentLoaded', function() {
            renderTable();
            updateStats();
            setMinDate();
        });

        // Handle form submit - BUG 100% FIXED ✅
        document.getElementById('absensiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nama = document.getElementById('nama').value.trim();
            const nip = document.getElementById('nip').value.trim();
            const jabatan = document.getElementById('jabatan').value;
            const status = document.getElementById('status').value;
            const tanggal = new Date().toLocaleDateString('id-ID');
            const jam = new Date().toLocaleTimeString('id-ID');

            if (!nama || !nip || !status) {
                alert('❌ Lengkapi field wajib (nama, NIP, status)!');
                return;
            }

            // Cek duplikat hari ini
            const today = new Date().toDateString();
            const duplicate = absensiData.find(item => 
                item.nip === nip && new Date(item.tanggal).toDateString() === today
            );

            if (duplicate) {
                alert('❌ NIP sudah absen hari ini!');
                return;
            }

            const newAbsensi = {id: Date.now(), nama, nip, jabatan, status, tanggal, jam};
            absensiData.unshift(newAbsensi);
            localStorage.setItem('absensiData', JSON.stringify(absensiData));
            
            this.reset();
            renderTable();
            updateStats();
            alert('✅ Absensi berhasil disimpan!');
        });

        // Render tabel
        function renderTable(data = filteredData) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-data">Tidak ada data yang sesuai filter</td></tr>';
                return;
            }

            tbody.innerHTML = data.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.nama}</td>
                    <td><strong>${item.nip}</strong></td>
                    <td>${item.jabatan || '-'}</td>
                    <td><span class="status ${item.status}">${item.status.toUpperCase()}</span></td>
                    <td>${item.tanggal}</td>
                    <td>${item.jam}</td>
                    <td class="actions">
                        <button onclick="deleteAbsensi(${item.id})" class="btn btn-danger" style="padding:6px 12px;font-size:12px;">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        // Update statistik
        function updateStats() {
            document.getElementById('totalAbsensi').textContent = absensiData.length;
            document.getElementById('hadirCount').textContent = absensiData.filter(item => item.status === 'hadir').length;
            document.getElementById('telatCount').textContent = absensiData.filter(item => item.status === 'telat').length;
            document.getElementById('alfaCount').textContent = absensiData.filter(item => item.status === 'alfa').length;
        }

        // Hapus data
        function deleteAbsensi(id) {
            if (confirm('Yakin hapus data ini?')) {
                absensiData = absensiData.filter(item => item.id !== id);
                filteredData = absensiData;
                localStorage.setItem('absensiData', JSON.stringify(absensiData));
                renderTable();
                updateStats();
            }
        }

        // Clear semua data
        function clearAllData() {
            if (confirm('⚠️ HAPUS SEMUA DATA? Tidak bisa dikembalikan!')) {
                localStorage.removeItem('absensiData');
                absensiData = [];
                filteredData = [];
                renderTable();
                updateStats();
            }
        }

        // Filter data
        function filterData() {
            const filterDate = document.getElementById('filterDate').value;
            const filterStatus = document.getElementById('filterStatus').value;

            filteredData = absensiData.filter(item => {
                const itemDate = item.tanggal.split('/').reverse().join('-');
                const dateMatch = !filterDate || itemDate === filterDate;
                const statusMatch = !filterStatus || item.status === filterStatus;
                return dateMatch && statusMatch;
            });

            renderTable();
        }

        function resetFilter() {
            document.getElementById('filterDate').value = '';
            document.getElementById('filterStatus').value = '';
            filteredData = [...absensiData];
            renderTable();
        }

        function setMinDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('filterDate').value = today;
            document.getElementById('filterDate').min = '2024-01-01';
        }

        // Export Excel
        function exportToExcel() {
            if (absensiData.length === 0) return alert('❌ Tidak ada data!');
            
            let csv = 'No,Nama,NIP,Jabatan,Status,Tanggal,Jam\n';
            absensiData.forEach((item, i) => {
                csv += `${i+1},"${item.nama}","${item.nip}","${item.jabatan || ''}","${item.status}","${item.tanggal}","${item.jam}"\n`;
            });

            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Absensi_Matahari_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Print
        function printTable() {
            window.print();
        }
    </script>
</body>
</html>
